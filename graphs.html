<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphs</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="graphs.js" defer></script>
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="filters.html">Filters</a>
        <a href="graphs.html">Graphs</a>
    </nav>
    <h1>Graphs</h1>

    <div class="export-actions">
        <button type="button" id="pdf-btn" class="export-btn">Create PDF Report</button>
        <button type="button" id="csv-btn" class="export-btn">Create CSV List</button>
    </div>

    <section class="charts-grid">
        <div class="chart-card">
            <h2>Expenses by Category</h2>
            <canvas id="category-pie-chart" aria-label="Pie chart of expenses by category"></canvas>
            <p id="pie-empty" class="chart-empty" hidden>No expenses to display.</p>
        </div>
        <div class="chart-card">
            <h2>Expenses by Month</h2>
            <canvas id="month-bar-chart" aria-label="Histogram of expenses by month"></canvas>
            <p id="bar-empty" class="chart-empty" hidden>No expenses to display.</p>
        </div>
    </section>
</body>
</html>
