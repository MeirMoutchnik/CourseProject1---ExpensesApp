<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Expenses</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="filters.html">Filters</a>
      <a href="graphs.html">Graphs</a>
    </nav>
    <h1>My Expenses</h1>

    <form action="" id="expense-form" onsubmit="addExpense(event)">
      <div
        class="form-group"
        id="category-select-wrap"
      >
        <label for="category-select">Category</label>
        <select
          name="categoryType"
          id="category-select"
          aria-label="Expense category"
          onchange="toggleOtherCategory()"
          required
        >
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="housing">Housing</option>
          <option value="utilities">Utilities</option>
          <option value="entertainment">Entertainment</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group" id="other-category-wrap" hidden>
        <label for="other-category">Specify category</label>
        <input type="text" name="otherCategory" id="other-category" />
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" name="description" id="description" required />
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" name="amount" id="amount" maxlength="6" required />
      </div>
      <div class="form-group" id="date-wrap">
        <label for="date">Date</label>
        <input type="date" name="date" id="date" required />
      </div>
      <div class="form-group input-submit">
        <input type="submit" name="submit" id="submit" value="Add/Edit Expense" />
      </div>
    </form>

    <table id="expense-table">
      <thead>
        <tr>
          <th>Category</th>
          <th>Description</th>
          <th>Amount</th>
          <th>Date</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="expense-table-body">
        <tr class="total-row">
          <td class="total-label">Total</td>
          <td class="total-amount">0</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
